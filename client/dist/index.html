<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo-white.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail Pay - Admin Portal</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 50%;
        left: 50%;
        background: white;
        display: flex;
        height: 100%;
        width: 100%;
        transform: translate(-50%, -50%);
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: all 15s linear;
        overflow: hidden;
      }

      #splash-screen.remove {
        animation: fadeout 0.7s forwards;
        z-index: 0;
      }

      @keyframes fadeout {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      .table thead th {
        color: #f80 !important;
        font-size: 0.65rem;
      }

      .table tbody td {
        font-size: 0.65rem;
      }

      .float-sm-end {
        overflow-x: auto;
        white-space: nowrap;
        max-width: 100%;
      }

      .float-sm-end .pagination {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 4px;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BSscqu2Z.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BVNm1bPp.css">
  </head>

  <body>
    <div id="app"></div>
    <div id="splash-screen">
      <img alt="Logo" src="/logo-white.svg" style="height: 4%" />
    </div>
    <script>
      const rootEl = document.querySelector("#app");
      new MutationObserver(() => {
        document.querySelector("#splash-screen")?.classList.add("remove");
      }).observe(rootEl, { childList: true });
    </script>
  </body>
</html>
